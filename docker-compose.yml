services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketpclce
      POSTGRES_PASSWORD: marketpclce
      POSTGRES_DB: marketpclce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketpclce -d marketpclce"]
      interval: 5s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Marketpclce_2026!
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Directus — админ-панель для управления справочниками (productions и
  # будущие CRM-сущности). Локально торчит на http://localhost:8055.
  # KEY/SECRET — фиксированные dev-значения, ротации не требуют (БД
  # пересоздавать всё равно проще, чем волноваться о dev-секретах).
  # Админ при первом запуске — admin@example.com / Admin12345.
  # (Directus 11 email-валидатор требует «настоящий» TLD; .local не годится.)
  # При первом старте Directus создаёт свои служебные таблицы (directus_*)
  # в той же БД marketpclce и предлагает импортировать существующие
  # таблицы как коллекции (см. docs/ADMIN_DIRECTUS.md).
  directus:
    image: directus/directus:11
    ports:
      - "8055:8055"
    environment:
      KEY: dev-directus-key-please-rotate-in-prod-1234567890abcdef
      SECRET: dev-directus-secret-please-rotate-in-prod-abcdef0987654321
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Admin12345
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: marketpclce
      DB_USER: marketpclce
      DB_PASSWORD: marketpclce
      CACHE_ENABLED: "true"
      CACHE_STORE: redis
      REDIS: redis://redis:6379
      PUBLIC_URL: http://localhost:8055
      CORS_ENABLED: "true"
      CORS_ORIGIN: "*"
    volumes:
      - directus-uploads:/directus/uploads
      - directus-extensions:/directus/extensions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

# Медиа — Yandex Object Storage (S3) для всех окружений. Локальный MinIO
# больше не запускаем: без ключей API стартует, upload-ручка
# /me/portfolio/upload-url вернёт 503 storage_disabled (см. cmd/api/main.go).

volumes:
  pgdata:
  osdata:
  directus-uploads:
  directus-extensions:
