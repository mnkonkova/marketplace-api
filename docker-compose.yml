services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketpclce
      POSTGRES_PASSWORD: marketpclce
      POSTGRES_DB: marketpclce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketpclce -d marketpclce"]
      interval: 5s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Marketpclce_2026!
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

# Медиа — Yandex Object Storage (S3) для всех окружений. Локальный MinIO
# больше не запускаем: без ключей API стартует, upload-ручка
# /me/portfolio/upload-url вернёт 503 storage_disabled (см. cmd/api/main.go).

volumes:
  pgdata:
  osdata:
