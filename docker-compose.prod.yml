# Prod-стек на одной VDS (Timeweb). Запуск из корня репо:
#   make deploy        # первый раз и после git pull
#   make prod-up       # просто поднять
#   make prod-logs     # логи всех сервисов
# Все служебные сервисы только во внутренней сети compose; наружу торчит
# лишь caddy (80/443). Медиа в Yandex Object Storage по S3_*.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marketpclce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password is required}
      POSTGRES_DB: ${POSTGRES_DB:-marketpclce}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    mem_limit: 512m

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:?opensearch admin password is required}
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -Eq 'green|yellow' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    mem_limit: 1g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 128m

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: marketpclce/app:latest
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 6
    mem_limit: 256m

  # worker делит образ с api (см. CMD в Dockerfile = api), переопределяем
  # на ./worker. Один и тот же конфиг через .env.prod.
  worker:
    image: marketpclce/app:latest
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    command: ["worker"]
    mem_limit: 128m

  # Directus — админ-панель платформы. Наружу проксируется через caddy
  # под admin.{DOMAIN} (см. marketplace-web/Caddyfile, блок admin.).
  # Метаданные Directus (коллекции, роли, пользователи) живут в той же
  # postgres в таблицах directus_* — бэкап БД их покрывает.
  # Volume directus-uploads нужно бэкапить отдельно если будут аплоады.
  directus:
    image: directus/directus:11
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      KEY: ${DIRECTUS_KEY:?DIRECTUS_KEY is required}
      SECRET: ${DIRECTUS_SECRET:?DIRECTUS_SECRET is required}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:?DIRECTUS_ADMIN_EMAIL is required}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:?DIRECTUS_ADMIN_PASSWORD is required}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-marketpclce}
      DB_USER: ${POSTGRES_USER:-marketpclce}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CACHE_ENABLED: "true"
      CACHE_STORE: redis
      REDIS: redis://redis:6379
      PUBLIC_URL: https://admin.${DOMAIN}
      CORS_ENABLED: "true"
      CORS_ORIGIN: https://admin.${DOMAIN}
    volumes:
      - directus-uploads:/directus/uploads
      - directus-extensions:/directus/extensions
    expose:
      - "8055"
    mem_limit: 512m

  # n8n — оркестратор CRM-нотификаций. Worker шлёт сюда POST на
  # /webhook/project-events; workflows внутри n8n маршрутизируют событие
  # в email/Telegram. Наружу проксируется через caddy под automation.{DOMAIN}.
  # ENCRYPTION_KEY обязателен и должен быть случайным (openssl rand -hex 32);
  # сменишь его — workflows c шифрованными credentials перестанут расшифровываться.
  # Метаданные хранит в SQLite в volume n8n-data — бэкапить отдельно от postgres.
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:?N8N_BASIC_AUTH_USER is required}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?N8N_BASIC_AUTH_PASSWORD is required}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY is required}
      N8N_HOST: automation.${DOMAIN}
      N8N_PROTOCOL: https
      N8N_PORT: "5678"
      WEBHOOK_URL: https://automation.${DOMAIN}/
      GENERIC_TIMEZONE: Europe/Moscow
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"
    volumes:
      - n8n-data:/home/node/.n8n
    expose:
      - "5678"
    mem_limit: 512m

  # Фронт + reverse-proxy. Образ собирается из соседнего клона
  # marketplace-web (../web). На VDS оба репо живут рядом:
  #   /opt/marketpclce/api  (этот репо)
  #   /opt/marketpclce/web  (git clone marketplace-web)
  # Caddyfile внутри образа уже знает: /api/* и /swagger/* → API_UPSTREAM,
  # всё остальное — статика + SPA fallback.
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    image: marketpclce/web:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required, e.g. app.example.com}
      API_UPSTREAM: api:8080
    volumes:
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      api:
        condition: service_healthy

  # ── Observability: node-exporter + Grafana Alloy → Grafana Cloud ──
  # node-exporter раздаёт CPU/RAM/диск/сеть VDS как Prometheus-метрики.
  # Порт наружу не торчит — только внутри docker network, alloy скрейпит
  # его как node-exporter:9100.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    mem_limit: 64m

  # Grafana Alloy — единый агент: метрики (api + node) и логи (docker)
  # пушит в Grafana Cloud. Креды берутся из .env.prod (GRAFANA_CLOUD_*).
  # Если креды пустые — контейнер запустится, но скрейп будет фейлиться;
  # это видно в `docker compose logs alloy`. Чтобы выключить полностью —
  # просто не запускай этот сервис: `--scale alloy=0`.
  alloy:
    image: grafana/alloy:v1.4.2
    restart: unless-stopped
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    environment:
      GRAFANA_CLOUD_PROM_URL: ${GRAFANA_CLOUD_PROM_URL:-}
      GRAFANA_CLOUD_PROM_USER: ${GRAFANA_CLOUD_PROM_USER:-}
      GRAFANA_CLOUD_PROM_KEY: ${GRAFANA_CLOUD_PROM_KEY:-}
      GRAFANA_CLOUD_LOKI_URL: ${GRAFANA_CLOUD_LOKI_URL:-}
      GRAFANA_CLOUD_LOKI_USER: ${GRAFANA_CLOUD_LOKI_USER:-}
      GRAFANA_CLOUD_LOKI_KEY: ${GRAFANA_CLOUD_LOKI_KEY:-}
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    depends_on:
      api:
        condition: service_started
      node-exporter:
        condition: service_started
    mem_limit: 256m

volumes:
  pgdata:
  osdata:
  caddydata:
  caddyconfig:
  alloy-data:
  directus-uploads:
  directus-extensions:
  n8n-data:
