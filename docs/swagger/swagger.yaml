info:
  contact: {}
  description: 'Discovery-маркетплейс специалистов: каталог, поиск, лиды, отзывы.'
  title: marketpclce API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.loginReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.TokenPair'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
      summary: Логин по email/телефону и паролю
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.refreshReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.TokenPair'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
      summary: Обмен refresh-токена на новую пару
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: регистрационные данные
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.registerReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_auth.registerResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
      summary: Регистрация пользователя
      tags:
      - auth
  /categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_catalog.CategoriesResponse'
      summary: Список категорий специалистов
      tags:
      - catalog
  /categories/stats:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_search.categoryStatsResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/internal_search.errorResponse'
      summary: Кол-во специалистов в каждой категории
      tags:
      - search
  /clarify:
    post:
      consumes:
      - application/json
      description: LLM возвращает следующий вопрос или конечный поисковый запрос (done=true).
      parameters:
      - description: история диалога
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_clarify.request'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_clarify.Result'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_clarify.errorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/internal_clarify.errorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/internal_clarify.errorResponse'
      summary: Уточняющий диалог по брифу
      tags:
      - llm
  /feed:
    get:
      description: Возвращает специалистов и связанные видео из портфолио. Поддерживает
        фильтры и cursor-пагинацию.
      parameters:
      - description: search text (игнорируется если задан ids)
        in: query
        name: q
        type: string
      - collectionFormat: csv
        description: category codes (multi, csv; игнорируется если задан ids)
        in: query
        items:
          type: string
        name: category
        type: array
      - collectionFormat: csv
        description: skill slugs (multi, csv; игнорируется если задан ids)
        in: query
        items:
          type: string
        name: skill
        type: array
      - description: city (игнорируется если задан ids)
        in: query
        name: city
        type: string
      - collectionFormat: csv
        description: 'user_id (csv, до 100) — жёсткий фильтр: показывать видео только
          этих спецов'
        in: query
        items:
          type: string
        name: ids
        type: array
      - description: видео на специалиста
        in: query
        name: per_specialist
        type: integer
      - description: cursor токен
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_feed.Result'
        "502":
          description: Bad Gateway
          schema:
