        type: array
      reviews_count:
        type: integer
      skills:
        items:
          $ref: '#/definitions/internal_profiles.SkillRef'
        type: array
      user_id:
        type: string
    type: object
  internal_profiles.Review:
    properties:
      author_name:
        type: string
      created_at:
        type: string
      id:
        type: string
      rating:
        type: integer
      text:
        type: string
    type: object
  internal_profiles.SetCategoriesInput:
    properties:
      codes:
        items:
          type: string
        type: array
      primary:
        type: string
      updated_at:
        description: |-
          UpdatedAt — optimistic-lock parent specialist_profiles.updated_at.
          Если задан — несовпадение → 409. Без поля — старое поведение.
        type: string
    type: object
  internal_profiles.SetSkillsInput:
