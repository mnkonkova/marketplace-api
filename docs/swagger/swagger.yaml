  internal_profiles.Profile:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      categories:
        items:
          type: string
        type: array
      city:
        type: string
      contact_email:
        description: |-
          Контакты для прямой связи. Возвращаются только владельцу профиля
          (через /me/profile) и менеджеру после создания заявки (см. /leads).
          В публичные DTO (PublicProfile, search.IndexDoc, feed.Specialist) НЕ
          попадают — это видимость не для feed'а.
        type: string
      contact_phone:
        type: string
      currency:
        type: string
      display_name:
        type: string
      is_freelance:
        description: |-
          IsFreelance — отдельное семантическое состояние «фрилансер».
          false по умолчанию; всегда сериализуется, чтобы фронт мог однозначно
          определить, что выбрано в выпадающем списке.
        type: boolean
      is_published:
        type: boolean
      primary_category:
        type: string
      production_id:
        description: |-
          ProductionID — выбранный специалистом продакшен из справочника.
          nil = не выбран. Взаимоисключающее с IsFreelance (CHECK + service).
        type: string
      production_name:
        description: |-
          ProductionName — денормализация name из productions через LEFT JOIN,
          для удобства фронта (один запрос вместо двух). Пусто, если ProductionID
          nil или соответствующий продакшен был деактивирован после привязки.
        type: string
      rate_max:
        type: integer
      rate_min:
        type: integer
      rating_avg:
        type: number
      reviews_count:
        type: integer
      skill_ids:
        items:
          type: string
        type: array
      updated_at:
        description: |-
          UpdatedAt — версия профиля для optimistic locking.
          Клиент должен прислать это значение обратно в PatchInput.UpdatedAt,
          чтобы защититься от lost-update при параллельных PATCH'ах.
        type: string
      user_id:
        type: string
    type: object
  internal_profiles.PublicProfile:
