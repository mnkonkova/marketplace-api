      updated_at:
        type: string
    type: object
  internal_reviews.createReq:
    properties:
      author_name:
        type: string
      lead_id:
        type: string
      rating:
        type: integer
      target_user_id:
        type: string
      text:
        type: string
    type: object
  internal_reviews.errResponse:
    properties:
      error:
        type: string
    type: object
  internal_reviews.listResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_reviews.Review'
        type: array
    type: object
  internal_search.CategoryCount:
    properties:
