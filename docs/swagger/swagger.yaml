  internal_summarize.Usage:
    properties:
      cache_creation_input_tokens:
        type: integer
      cache_read_input_tokens:
        type: integer
      input_tokens:
        type: integer
      output_tokens:
        type: integer
    type: object
  internal_summarize.errorResponse:
    properties:
      error:
        type: string
    type: object
  internal_summarize.request:
    properties:
      categories:
        items:
          type: string
        type: array
      city:
        type: string
      limit:
        type: integer
      q:
        type: string
      rate_max:
        type: integer
      rate_min:
        type: integer
      skills:
        items:
          type: string
        type: array
      target_category:
        type: string
    type: object
  marketpclce_internal_search.IndexDoc:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      categories:
        items:
          type: string
        type: array
      city:
        type: string
      currency:
        type: string
      display_name:
        type: string
      is_published:
        type: boolean
      last_video_at:
        description: |-
          LastVideoAt — MAX(created_at) видео-айтемов спеца. nil если видео нет.
          Используется /feed для tie-breaker'а после rating_avg.
        type: string
      primary_category:
        type: string
      rate_max:
        type: integer
      rate_min:
        type: integer
      rating_avg:
        type: number
      reviews_count:
        type: integer
      skill_slugs:
        items:
          type: string
        type: array
      skill_titles:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
info:
  contact: {}
  description: 'Discovery-маркетплейс специалистов: каталог, поиск, лиды, отзывы.'
  title: marketpclce API
  version: "1.0"
paths:
  /admin/productions:
    get:
      description: Только для роли admin/moderator или service-токена (Directus).
        Включает is_active=false.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_productions.AdminProductionsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_productions.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_productions.errorResponse'
      security:
      - BearerAuth: []
      summary: Список всех продакшенов (включая архивные)
      tags:
      - admin-productions
    post:
      consumes:
      - application/json
      parameters:
      - description: Поля создания
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_productions.CreateInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_productions.Production'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_productions.errorResponse'
        "409":
          description: Продакшен с таким именем уже существует среди активных
          schema:
            $ref: '#/definitions/internal_productions.errorResponse'
      security:
      - BearerAuth: []
      summary: Создать продакшен
      tags:
      - admin-productions
  /admin/productions/{id}:
    delete:
      consumes:
      - application/json
      description: Запись остаётся в БД (is_active=false). Привязанные специалисты
        не блокируются. В публичном /productions запись больше не появляется.
      parameters:
      - description: Production ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Optimistic-lock версия (RFC3339). Если задана и не совпадает
          — 409.
        in: query
        name: updated_at
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_productions.Production'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_productions.errorResponse'
        "409":
          description: stale_updated_at
          schema:
            $ref: '#/definitions/internal_productions.errorResponse'
      security:
      - BearerAuth: []
      summary: Деактивировать продакшен (soft-delete)
      tags:
      - admin-productions
    get:
      parameters:
      - description: Production ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_productions.Production'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_productions.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_productions.errorResponse'
      security:
      - BearerAuth: []
      summary: Получить продакшен по ID
      tags:
      - admin-productions
    patch:
      consumes:
      - application/json
      description: Клиент должен прислать updated_at, полученный из GET/PATCH. Несовпадение
        → 409.
      parameters:
      - description: Production ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Частичный апдейт + updated_at
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_productions.UpdateInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_productions.Production'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_productions.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_productions.errorResponse'
        "409":
          description: stale_updated_at | duplicate_name
          schema:
            $ref: '#/definitions/internal_productions.errorResponse'
      security:
      - BearerAuth: []
      summary: Изменить продакшен (optimistic-lock через updated_at)
      tags:
      - admin-productions
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.loginReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.TokenPair'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
      summary: Логин по email/телефону и паролю
      tags:
      - auth
  /auth/password-reset/confirm:
    post:
      consumes:
      - application/json
      parameters:
      - description: token + новый пароль
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.passwordResetConfirmReq'
      produces:
      - application/json
      responses:
        "200":
          description: свежая пара tokens — фронт может авто-логинить
          schema:
            $ref: '#/definitions/internal_auth.TokenPair'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
        "410":
          description: 'token_invalid: токен неизвестен, использован или просрочен'
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
      summary: Применить новый пароль по токену из письма
      tags:
      - auth
  /auth/password-reset/request:
    post:
      consumes:
      - application/json
      description: |-
        Всегда 204 (anti-enumeration). Если email зарегистрирован,
        на него уйдёт письмо со ссылкой DOMAIN/auth/reset?token=...
      parameters:
      - description: email
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.passwordResetRequestReq'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
      summary: Запросить ссылку сброса пароля
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.refreshReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.TokenPair'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
      summary: Обмен refresh-токена на новую пару
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: |-
        При невалидном вводе или занятом email отвечает 400 invalid_input
        (разные причины не различаются — anti-enumeration).
      parameters:
      - description: регистрационные данные
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.registerReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_auth.registerResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
      summary: Регистрация пользователя
      tags:
      - auth
  /auth/resend-verification:
    post:
      description: Гасит прошлые токены и шлёт новое письмо. Cooldown 60s по user_id.
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
        "429":
          description: resend_cooldown
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
      security:
      - BearerAuth: []
      summary: Перевыслать письмо подтверждения email
      tags:
      - auth
  /auth/verify-email:
    post:
      consumes:
      - application/json
      parameters:
      - description: token из ссылки в письме
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.verifyEmailReq'
      produces:
      - application/json
      responses:
        "200":
          description: новая пара токенов с актуальным email_verified
          schema:
            $ref: '#/definitions/internal_auth.TokenPair'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
        "410":
          description: 'token_invalid: токен неизвестен, использован, просрочен или
            email сменился'
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
      summary: Подтвердить email по токену из письма
      tags:
      - auth
  /categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_catalog.CategoriesResponse'
      summary: Список категорий специалистов
      tags:
      - catalog
  /categories/stats:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_search.categoryStatsResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/internal_search.errorResponse'
      summary: Кол-во специалистов в каждой категории
      tags:
      - search
  /clarify:
    post:
      consumes:
      - application/json
      description: LLM возвращает следующий вопрос или конечный поисковый запрос (done=true).
      parameters:
      - description: история диалога
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_clarify.request'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_clarify.Result'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_clarify.errorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/internal_clarify.errorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/internal_clarify.errorResponse'
      summary: Уточняющий диалог по брифу
      tags:
      - llm
  /feed:
    get:
      description: Возвращает специалистов и связанные видео из портфолио. Поддерживает
        фильтры и cursor-пагинацию.
      parameters:
      - description: search text (игнорируется если задан ids)
        in: query
        name: q
        type: string
      - collectionFormat: csv
        description: category codes (multi, csv; игнорируется если задан ids)
        in: query
        items:
          type: string
        name: category
        type: array
      - collectionFormat: csv
        description: skill slugs (multi, csv; игнорируется если задан ids)
        in: query
        items:
          type: string
        name: skill
        type: array
      - description: city (игнорируется если задан ids)
        in: query
        name: city
        type: string
      - collectionFormat: csv
        description: 'user_id (csv, до 100) — жёсткий фильтр: показывать видео только
          этих спецов'
        in: query
        items:
          type: string
        name: ids
        type: array
      - description: видео на специалиста
        in: query
        name: per_specialist
        type: integer
      - description: cursor токен
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_feed.Result'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/internal_feed.feedError'
      summary: Лента «портфолио по категориям»
      tags:
      - feed
  /leads:
    post:
      consumes:
      - application/json
      description: Менеджер/клиент создаёт лид и выбирает специалистов-получателей.
        В ответе — id и контакты выбранных спецов (видны только создателю).
      parameters:
      - description: lead payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_leads.createReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_leads.CreateResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_leads.errorResponse'
        "403":
          description: email_unverified — для авторизованного клиента email должен
            быть подтверждён
          schema:
            $ref: '#/definitions/internal_leads.errorResponse'
      security:
      - BearerAuth: []
      summary: Создать заявку (lead)
      tags:
      - leads
  /me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.meResp'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_auth.errorResponse'
      security:
      - BearerAuth: []
      summary: Текущий пользователь
      tags:
      - auth
  /me/leads/{id}/recipient:
    patch:
      consumes:
      - application/json
      parameters:
      - description: lead id
        in: path
        name: id
        required: true
        type: string
      - description: статус
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_leads.recipientReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_leads.recipientStatusResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_leads.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_leads.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_leads.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_leads.errorResponse'
      security:
      - BearerAuth: []
      summary: Обновить статус получателя по лиду
      tags:
      - leads
  /me/leads/incoming:
    get:
      parameters:
      - description: sent|viewed|accepted|declined
        in: query
        name: status
        type: string
      - description: default 20
        in: query
        name: limit
        type: integer
      - description: default 0
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_leads.incomingListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_leads.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_leads.errorResponse'
      security:
      - BearerAuth: []
      summary: Входящие заявки специалиста
      tags:
      - leads
  /me/portfolio:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_profiles.portfolioListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
      security:
      - BearerAuth: []
      summary: Свои элементы портфолио
      tags:
      - portfolio
    post:
      consumes:
      - application/json
      parameters:
      - description: video payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_profiles.PortfolioCreateInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_profiles.PortfolioItem'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
      security:
      - BearerAuth: []
      summary: Добавить элемент портфолио (видео по URL)
      tags:
      - portfolio
  /me/portfolio/{id}:
    delete:
      parameters:
      - description: portfolio item id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: no content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
      security:
      - BearerAuth: []
      summary: Удалить элемент портфолио
      tags:
      - portfolio
  /me/portfolio/{id}/categories:
    put:
      consumes:
      - application/json
      parameters:
      - description: portfolio item id
        in: path
        name: id
        required: true
        type: string
      - description: category codes
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_profiles.PortfolioSetCategoriesInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_profiles.PortfolioItem'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
      security:
      - BearerAuth: []
      summary: Заменить категории у элемента портфолио
      tags:
      - portfolio
  /me/portfolio/upload-url:
    post:
      consumes:
      - application/json
      parameters:
      - description: filename/size
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_profiles.PortfolioUploadURLInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_profiles.PortfolioUploadURL'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
      security:
      - BearerAuth: []
      summary: Presigned PUT URL для аплоада видео в S3
      tags:
      - portfolio
  /me/profile:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_profiles.Profile'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
      security:
      - BearerAuth: []
      summary: Свой профиль (вместе с контактами)
      tags:
      - profile
    patch:
      consumes:
      - application/json
      description: |-
        Одной транзакцией под одной optimistic-lock версией:
        поля профиля + (опционально) categories + (опционально) skills.
        Любая секция, оставленная nil/неуказанной, не трогается.
      parameters:
      - description: профиль + categories + skills + updated_at
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_profiles.PatchFullInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_profiles.Profile'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
      security:
      - BearerAuth: []
      summary: Обновить свой профиль (атомарно)
      tags:
      - profile
  /me/profile/check:
    post:
      consumes:
      - application/json
      description: LLM возвращает вердикты и подсказки по тексту bio и display_name.
        Доступен, только если включён LLM провайдер.
      parameters:
      - description: профильные поля
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_profilecheck.checkReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_profilecheck.Result'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_profilecheck.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_profilecheck.errorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/internal_profilecheck.errorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/internal_profilecheck.errorResponse'
      security:
      - BearerAuth: []
      summary: Проверить bio/имя профиля через LLM
      tags:
      - profile
  /me/profile/publish:
    post:
      description: Требует подтверждённого email. Без подтверждения — 403 `email_unverified`,
        фронт должен показать баннер с предложением подтвердить (и кнопку «Отправить
        ещё раз» → POST /auth/resend-verification).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_profiles.Profile'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "403":
          description: email_unverified
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
      security:
      - BearerAuth: []
      summary: Опубликовать профиль
      tags:
      - profile
  /me/profile/unpublish:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_profiles.Profile'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
      security:
      - BearerAuth: []
      summary: Снять профиль с публикации
      tags:
      - profile
  /me/projects:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_projects.ClientProjectsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_projects.errorResponse'
      security:
      - BearerAuth: []
      summary: Список проектов клиента
      tags:
      - me-projects
  /me/projects/{id}:
    get:
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_projects.ProjectClientView'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_projects.errorResponse'
      security:
      - BearerAuth: []
      summary: Карточка проекта клиента
      tags:
      - me-projects
  /me/projects/{id}/funnel:
    get:
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_projects.FunnelView'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_projects.errorResponse'
      security:
      - BearerAuth: []
      summary: Воронка проекта клиента (стадии и видимые шаги)
      tags:
      - me-projects
  /me/projects/by_lead/{lead_id}:
    get:
      description: Используется фронтом для группировки проектов под одной шапкой
        «Бриф от X». Для marketplace-source проектов; для своих лида нет → пустой
        массив.
      parameters:
      - description: Lead ID
        in: path
        name: lead_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_projects.ClientProjectsResponse'
      security:
      - BearerAuth: []
      summary: Все проекты клиента по одному брифу (лиду)
      tags:
      - me-projects
  /me/uploads/image:
    post:
      consumes:
      - application/json
      parameters:
      - description: filename/size
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_profiles.ImageUploadURLInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_profiles.PortfolioUploadURL'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
      security:
      - BearerAuth: []
      summary: Presigned PUT URL для аплоада картинки (аватар / превью)
      tags:
      - portfolio
  /productions:
    get:
      description: Публичный справочник для выпадающего списка в профиле специалиста.
        Возвращает только is_active=true. Сортировка по имени (case-insensitive).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_productions.ProductionsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_productions.errorResponse'
      summary: Список активных продакшенов
      tags:
      - productions
  /reviews:
    post:
      consumes:
      - application/json
      description: Оставляет отзыв на специалиста. Если указан lead_id, то клиент
        должен быть автором лида, а target — принятым получателем.
      parameters:
      - description: review payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_reviews.createReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_reviews.Review'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_reviews.errResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_reviews.errResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_reviews.errResponse'
      security:
      - BearerAuth: []
      summary: Создать отзыв
      tags:
      - reviews
  /reviews/{id}:
    delete:
      description: Удаляет отзыв. Только автор отзыва.
      parameters:
      - description: review id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: no content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_reviews.errResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_reviews.errResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_reviews.errResponse'
      security:
      - BearerAuth: []
      summary: Удалить отзыв
      tags:
      - reviews
    patch:
      consumes:
      - application/json
      description: Изменяет рейтинг и/или текст отзыва. Только автор отзыва.
      parameters:
      - description: review id
        in: path
        name: id
        required: true
        type: string
      - description: patch payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_reviews.UpdateInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_reviews.Review'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_reviews.errResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_reviews.errResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_reviews.errResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_reviews.errResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_reviews.errResponse'
      security:
      - BearerAuth: []
      summary: Изменить отзыв
      tags:
      - reviews
  /search:
    get:
      description: Возвращает hits + relaxed/similar если soft-фильтры не сошлись.
      parameters:
      - description: search text
        in: query
        name: q
        type: string
      - collectionFormat: csv
        description: category codes (multi)
        in: query
        items:
          type: string
        name: category
        type: array
      - collectionFormat: csv
        description: skill slugs (multi)
        in: query
        items:
          type: string
        name: skill
        type: array
      - description: city
        in: query
        name: city
        type: string
      - description: rate min
        in: query
        name: rate_min
        type: integer
      - description: rate max
        in: query
        name: rate_max
        type: integer
      - description: limit
        in: query
        name: limit
        type: integer
      - description: offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_search.Result'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/internal_search.errorResponse'
      summary: Поиск специалистов
      tags:
      - search
  /search/summarize:
    post:
      consumes:
      - application/json
      description: По текстовому запросу/фильтрам поиска возвращает подобранную LLM-выдачу.
      parameters:
      - description: поисковые параметры
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_summarize.request'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_summarize.Result'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_summarize.errorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/internal_summarize.errorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/internal_summarize.errorResponse'
      summary: LLM-подбор «топ-N специалистов»
      tags:
      - llm
  /skills:
    get:
      parameters:
      - description: tool|platform|genre|skill
        in: query
        name: kind
        type: string
      - description: Код категории из /categories — отфильтровать навыки, релевантные
          категории (см. skill_categories). Платформы при фильтре по категории не
          возвращаются.
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_catalog.SkillsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_catalog.errorResponse'
      summary: Список навыков
      tags:
      - catalog
  /specialists/{id}:
    get:
      parameters:
      - description: user id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_profiles.PublicProfile'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_profiles.errorResponse'
      summary: Публичный профиль специалиста
      tags:
      - profile
  /specialists/{id}/reviews:
    get:
      description: Листит отзывы, отсортированные по дате убывания.
      parameters:
      - description: specialist user id
        in: path
        name: id
        required: true
        type: string
      - description: default 20, max 100
        in: query
        name: limit
        type: integer
      - description: default 0
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_reviews.listResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_reviews.errResponse'
      summary: Отзывы на специалиста (пагинация)
      tags:
      - reviews
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
