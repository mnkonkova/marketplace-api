  internal_profiles.PatchFullInput:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      categories:
        $ref: '#/definitions/internal_profiles.CategoriesPart'
      city:
        type: string
      contact_email:
        type: string
      contact_phone:
        type: string
      currency:
        type: string
      display_name:
        type: string
      is_freelance:
        description: |-
          IsFreelance — nil не трогать, non-nil SET. Бизнес-правило XOR с
          ProductionID применяется в service.PatchFull до записи: если оба
          заданы и оба активны — IsFreelance=true побеждает (production_id
          форсируется в NULL); если ProductionID задаётся в значение, а
          IsFreelance не передан — IsFreelance принудительно сбрасывается
          в false. CHECK-constraint в БД — последний рубеж.
        type: boolean
      production_id:
        allOf:
        - $ref: '#/definitions/internal_profiles.OptionalUUID'
        description: ProductionID — tri-state (см. OptionalUUID). null = clear, "<uuid>"
          = set.
      rate_max:
        type: integer
      rate_min:
        type: integer
      skills:
        $ref: '#/definitions/internal_profiles.SkillsPart'
      updated_at:
        type: string
    type: object
  internal_profiles.PortfolioCreateInput:
    properties:
      aspect:
        type: string
      category_codes:
        items:
          type: string
        type: array
      description:
        type: string
      duration_sec:
        type: integer
      thumbnail_url:
        type: string
      title:
        type: string
      video_url:
        type: string
    type: object
  internal_profiles.PortfolioItem:
